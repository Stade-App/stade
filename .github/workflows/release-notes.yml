name: Release Notes

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Açıklaması güncellenecek Tag (Örn: v1.0.0). Otomatik akış için boş bırakın.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate categorized release notes
        id: notes
        run: |
          set -euo pipefail

          # Eğer manuel tetikleme ile bir tag girildiyse onu kullan, yoksa push edilen tag'i al
          INPUT_TAG="${{ inputs.target_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            CURRENT_TAG="$INPUT_TAG"
          else
            CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          fi

          # Tag'in depoda var olup olmadığını kontrol et
          if ! git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "::error::'${CURRENT_TAG}' adında bir tag bulunamadı!"
            exit 1
          fi

          # CURRENT_TAG öncesindeki tag'i bul
          PREV_TAG="$(git tag --sort=-creatordate | grep -A1 -x "$CURRENT_TAG" | tail -n1 || true)"
          if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            PREV_TAG=""
          fi

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="$CURRENT_TAG"
          fi

          WORKDIR="$(mktemp -d)"

          # Fixed emission order; anything unmatched falls into "other".
          TYPES="feat fix perf refactor docs style test build ci chore revert other"
          for t in $TYPES; do : > "$WORKDIR/$t.md"; done

          title_for() {
            case "$1" in
              feat) echo "✨ Features" ;;
              fix) echo "🐛 Bug Fixes" ;;
              perf) echo "⚡ Performance" ;;
              refactor) echo "♻️ Refactoring" ;;
              docs) echo "📝 Documentation" ;;
              style) echo "🎨 Style" ;;
              test) echo "✅ Tests" ;;
              build) echo "📦 Build" ;;
              ci) echo "👷 CI" ;;
              chore) echo "🧹 Chores" ;;
              revert) echo "⏪ Reverts" ;;
              other) echo "📌 Other Changes" ;;
            esac
          }

          commit_pattern='^([a-zA-Z]+)(\([^)]*\))?!?:[[:space:]]*(.+)$'

          while IFS=$'\t' read -r hash subject; do
            [ -z "$subject" ] && continue
            case "$subject" in
              "Merge "*) continue ;;
            esac

            type="other"
            desc="$subject"
            if [[ "$subject" =~ $commit_pattern ]]; then
              candidate="$(echo "${BASH_REMATCH[1]}" | tr '[:upper:]' '[:lower:]')"
              for t in $TYPES; do
                if [ "$t" = "$candidate" ]; then
                  type="$candidate"
                  desc="${BASH_REMATCH[3]}"
                  break
                fi
              done
            fi

            echo "- ${desc} (${hash})" >> "$WORKDIR/$type.md"
          done < <(git log --no-merges --pretty=format:'%h%x09%s' "$RANGE")

          NOTES_FILE="$WORKDIR/notes.md"
          echo "## Changes in ${CURRENT_TAG}" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"

          any_section=0
          for t in $TYPES; do
            if [ -s "$WORKDIR/$t.md" ]; then
              any_section=1
              echo "### $(title_for "$t")" >> "$NOTES_FILE"
              echo "" >> "$NOTES_FILE"
              cat "$WORKDIR/$t.md" >> "$NOTES_FILE"
              echo "" >> "$NOTES_FILE"
            fi
          done

          if [ "$any_section" -eq 0 ]; then
            echo "_No changes recorded._" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
          fi

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${CURRENT_TAG}" >> "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.notes.outputs.current_tag }}"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"

          # Pre-release kontrolü (alpha, beta, rc içeriyorsa bayrak ekler)
          EXTRA_FLAGS=""
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            EXTRA_FLAGS="--prerelease"
          fi

          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --notes-file "$NOTES_FILE" $EXTRA_FLAGS
          else
            gh release create "$TAG" --repo "${GITHUB_REPOSITORY}" --title "$TAG" --notes-file "$NOTES_FILE" $EXTRA_FLAGS
          fi